<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>配送日報 ㈱アクアクララレモン 九州支店</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ========== SCREEN ========== */
@media screen {
  :root {
    --blue:#1a4f8a; --blue2:#2e6db4; --bluep:#e8f0fa;
    --acc:#0096d6; --txt:#1a1a2e; --muted:#5a6a7e; --bdr:#c8d8ea; --bg:#f4f7fb;
  }
  #printArea { display: none; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif; background:var(--bg); color:var(--txt); }

  .app-bar {
    background:var(--blue); color:white; padding:13px 16px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,0.25);
  }
  .app-bar h1 { font-size:17px; font-weight:700; }
  .app-bar-sub { font-size:11px; opacity:.7; margin-top:1px; }
  .app-bar-btns { display:flex; gap:8px; flex-shrink:0; }
  .btn { border:none; border-radius:8px; padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn-print  { background:#e65100; color:white; font-size:14px; }
  .btn-email  { background:#1a7f4b; color:white; font-size:14px; }
  .btn-newday { background:rgba(255,255,255,0.2); color:white; }

  .main { padding:12px; max-width:640px; margin:0 auto; padding-bottom:40px; }
  .card { background:white; border-radius:12px; box-shadow:0 1px 5px rgba(0,0,0,0.1); margin-bottom:14px; overflow:hidden; }
  .card-hdr { background:var(--blue); color:white; padding:10px 14px; font-size:13px; font-weight:700; letter-spacing:.03em; }
  .card-body { padding:14px; }

  .field { margin-bottom:12px; }
  .field:last-child { margin-bottom:0; }
  .field > label { display:block; font-size:11px; font-weight:700; color:var(--blue); margin-bottom:4px; }
  .field input[type=text],.field input[type=date],.field input[type=number],.field select,.field textarea {
    width:100%; padding:10px 12px; border:1.5px solid var(--bdr); border-radius:8px;
    font-size:15px; font-family:inherit; background:white; -webkit-appearance:none; appearance:none;
  }
  .field input:focus,.field select:focus,.field textarea:focus { outline:none; border-color:var(--acc); }

  .field-row { display:flex; gap:10px; }
  .field-row .field { flex:1; }

  .area-btns { display:flex; flex-wrap:wrap; gap:7px; }
  .area-btn {
    padding:7px 13px; border:1.5px solid var(--bdr); border-radius:20px;
    font-size:13px; font-family:inherit; background:white; color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .area-btn.on { background:var(--blue); border-color:var(--blue); color:white; font-weight:700; }

  .sum-bar {
    background:var(--blue); color:white; border-radius:10px;
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px; margin-bottom:14px;
  }
  .sum-item { text-align:center; }
  .sum-lbl { font-size:10px; opacity:.75; margin-bottom:3px; }
  .sum-val { font-size:20px; font-weight:700; }
  .sum-unit { font-size:10px; opacity:.8; }

  .d-item { border:1.5px solid var(--bdr); border-radius:10px; margin-bottom:10px; overflow:hidden; }
  .d-item-hdr { background:var(--bluep); padding:8px 12px; display:flex; align-items:center; gap:8px; }
  .d-no { font-size:13px; font-weight:700; color:var(--blue); min-width:28px; }
  .d-nm { flex:1; padding:8px 10px; border:1.5px solid var(--bdr); border-radius:8px; font-size:15px; font-family:inherit; background:white; }
  .btn-del { background:none; border:none; color:#e05050; font-size:20px; cursor:pointer; padding:0 2px; line-height:1; }
  .btn-mic { background:none; border:none; font-size:20px; cursor:pointer; padding:0 4px; line-height:1; opacity:0.6; }
  .btn-mic.listening { opacity:1; animation:micpulse .7s ease-in-out infinite; }
  @keyframes micpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }
  .d-body { padding:12px; }

  .res-btns { display:flex; flex-wrap:wrap; gap:6px; }
  .res-btn {
    padding:7px 12px; border:1.5px solid var(--bdr); border-radius:20px;
    font-size:13px; font-family:inherit; background:white; color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .res-btn.on { background:var(--blue); border-color:var(--blue); color:white; font-weight:700; }

  .g2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .g4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:6px; }
  .field.sm > label { font-size:10px; }
  .field.sm input,.field.sm select { padding:8px 10px; font-size:14px; }

  .sv-checks { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .sv-pill {
    display:flex; align-items:center; gap:5px; background:var(--bluep);
    border-radius:20px; padding:6px 12px; font-size:12px; cursor:pointer; border:1.5px solid transparent; transition:all .15s;
  }
  .sv-pill input[type=checkbox] { width:14px; height:14px; accent-color:var(--blue); }
  .sv-pill.on { background:var(--blue); color:white; }

  .btn-add {
    width:100%; padding:13px; background:var(--bluep);
    border:2px dashed var(--blue2); border-radius:10px;
    color:var(--blue); font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
  }
  .time-btn{width:100%;padding:8px 10px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;background:white;text-align:left;cursor:pointer;color:#5a6a7e;}
  .time-btn.has-val{color:var(--txt);}
  .tp-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:900;display:flex;align-items:center;justify-content:center;}
  .tp-box{background:white;border-radius:6px;width:82%;max-height:65vh;overflow-y:auto;box-shadow:0 6px 24px rgba(0,0,0,0.25);}
  .tp-item{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:0.5px solid #e8e8e8;font-size:18px;cursor:pointer;}
  .tp-item:last-child{border-bottom:none;}
  .tp-circle{width:22px;height:22px;border-radius:50%;border:2px solid #bbb;flex-shrink:0;position:relative;}
  .tp-circle.tp-on{border-color:#009688;}
  .tp-circle.tp-on::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:#009688;}
  .cash-total { text-align:center; padding:18px 14px; }
  .cash-total .lbl { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .cash-total .val { font-size:34px; font-weight:700; color:var(--blue); }
}

/* ========== PRINT ========== */
@media print {
  #inputForm { display:none !important; }
  #printArea { display:block !important; width:100%; flex-shrink:0; }
  .note-cnt { display:none !important; }
  @page { size:A4 portrait; margin:6mm 8mm; }
  body {
    font-family:'游ゴシック','Yu Gothic','YuGothic','MS Gothic',sans-serif;
    font-size:7pt; color:#000; background:white;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    display:flex; flex-direction:column; justify-content:center; height:285mm;
  }
  table { border-collapse:collapse; width:100%; table-layout:fixed; page-break-inside:avoid; }
  td {
    border:0.5pt solid #222; padding:0.5pt 2pt;
    vertical-align:middle; text-align:center; line-height:1.2; overflow:hidden;
  }
  tr.data-row { height:22pt; }
  tr.data-row td { overflow:hidden; }
  .nb { border:none !important; }
  .tl { text-align:left; }
  .tr { text-align:right; }
  .bg { background:white !important; }
  .vt { vertical-align:top; }
  .maru {
    display:inline-block; border:0.8pt solid #000;
    border-radius:1em; padding:0 1pt; line-height:1.2; vertical-align:middle;
  }
}
</style>
</head>
<body>

<!-- ===== INPUT FORM ===== -->
<div id="inputForm">
  <div class="app-bar">
    <div><h1>配送日報</h1></div>
    <div class="app-bar-btns">
      <button class="btn btn-newday" onclick="newDay()">新規作成</button>
      <button class="btn btn-print"  onclick="doPrint()">印刷・出力</button>
      <button class="btn btn-email"  onclick="doEmail()">メール送信</button>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-hdr">基本情報</div>
      <div class="card-body">
        <div class="field-row">
          <div class="field">
            <label>日付</label>
            <input type="date" id="hDate" oninput="onDateChange();save()">
          </div>
          <div class="field" style="flex:0 0 85px;">
            <label>曜日</label>
            <input type="text" id="hDow" readonly style="text-align:center;background:#f4f7fb;font-weight:bold;color:#1a4f8a;">
          </div>
        </div>
        <div class="field">
          <label>氏名</label>
          <input type="text" id="hName" placeholder="氏名を入力" oninput="save()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">配送エリア（タップして選択）</div>
      <div class="card-body">
        <div class="area-btns" id="areaBtns"></div>
        <div class="field" style="margin-top:10px;">
          <label>その他：詳細</label>
          <input type="text" id="aOth" placeholder="その他の場合は記入" oninput="save()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">連絡事項</div>
      <div class="card-body">
        <textarea id="hNote" rows="4" maxlength="91" placeholder="最大4行・1行22文字" oninput="noteInput(this)"
          style="width:100%;padding:10px 12px;border:1.5px solid #c8d8ea;border-radius:8px;font-size:15px;font-family:inherit;resize:vertical;"></textarea>
        <div class="note-cnt" style="font-size:11px;color:#5a6a7e;text-align:right;margin-top:3px;">残り<span id="noteCount">91</span>文字</div>
      </div>
    </div>

    <div class="sum-bar">
      <div class="sum-item"><div class="sum-lbl">実件数</div><div class="sum-val" id="sCnt">0</div><div class="sum-unit">件</div></div>
      <div class="sum-item"><div class="sum-lbl">配送 12L</div><div class="sum-val" id="sD12">0</div><div class="sum-unit">本</div></div>
      <div class="sum-item"><div class="sum-lbl">配送 7L</div><div class="sum-val" id="sD7">0</div><div class="sum-unit">本</div></div>
      <div class="sum-item"><div class="sum-lbl">空回収 12L</div><div class="sum-val" id="sE12">0</div><div class="sum-unit">本</div></div>
      <div class="sum-item"><div class="sum-lbl">空回収 7L</div><div class="sum-val" id="sE7">0</div><div class="sum-unit">本</div></div>
      <div class="sum-item"><div class="sum-lbl">集金合計</div><div class="sum-val" id="sCash">0</div><div class="sum-unit">円</div></div>
    </div>

    <div id="rowsWrap"></div>
    <button class="btn-add" onclick="addRowSorted()">＋ 配送先を追加</button>

    <div class="card" style="margin-top:14px;">
      <div class="card-hdr">本日集金合計（自動計算）</div>
      <div class="cash-total">
        <div class="lbl">各配送先の集金金額の合計</div>
        <div class="val" id="cashTotal">0 円</div>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <div class="card-hdr">車載残ボトル</div>
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:8px;font-size:15px;">
          <span style="white-space:nowrap;color:#3a4a5e;">12L ×</span>
          <input type="number" id="hBottle" min="0" placeholder="本数" oninput="save()"
            style="width:80px;padding:8px 10px;border:1.5px solid #c8d8ea;border-radius:8px;font-size:16px;font-family:inherit;">
          <span style="color:#3a4a5e;">本</span>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-top:18px;">
      <button onclick="sortRows()" style="background:var(--blue);color:white;border:none;border-radius:50%;width:90px;height:90px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 3px 10px rgba(26,79,138,0.35);display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;line-height:1.4;">
        <span style="font-size:20px;">↕</span>
        <span>時間順に</span>
        <span>並べ替え</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== PRINT AREA ===== -->
<div id="printArea"></div>

/* ---- Area buttons ---- */
function buildAreaBtns(){
  const wrap=document.getElementById('areaBtns');
  ALL_AREAS.forEach(a=>{
    const b=document.createElement('button');
    b.type='button'; b.className='area-btn'; b.dataset.area=a; b.textContent=a;
    b.onclick=()=>toggleArea(a,b);
    wrap.appendChild(b);
  });
}
function toggleArea(a,btn){
  const i=selAreas.indexOf(a);
  if(i>=0){selAreas.splice(i,1);btn.classList.remove('on');}
  else    {selAreas.push(a);   btn.classList.add('on');}
  save();
}
function setAreas(arr){
  selAreas=[...(arr||[])];
  document.querySelectorAll('.area-btn').forEach(b=>{
    b.classList.toggle('on',selAreas.includes(b.dataset.area));
  });
}

/* ---- Time 8:30-19:00 ---- */
function pad(n){return String(n).padStart(2,'0');}
function nearestTime(){
  const now=new Date();
  const total=now.getHours()*60+now.getMinutes();
  const rounded=Math.round(total/5)*5;
  const clamped=Math.max(8*60+30,Math.min(19*60,rounded));
  return pad(Math.floor(clamped/60))+':'+pad(clamped%60);
}

/* ---- Time select options ---- */
function timeOpts(sel){
  let h='<option value="">--:--</option>';
  for(let m=8*60+30;m<=19*60;m+=5){
    const t=pad(Math.floor(m/60))+':'+pad(m%60);
    h+=`<option${t===sel?' selected':''}>${t}</option>`;
  }
  return h;
}


/* ---- Custom time picker ---- */
let _tp=null;
function openTP(sel){
  if(_tp)return;
  const btn=sel.nextElementSibling;
  const curVal=sel.value;
  const times=[];
  for(let m=8*60+30;m<=19*60;m+=5)times.push(pad(Math.floor(m/60))+':'+pad(m%60));
  const centerVal=curVal||nearestTime();
  const overlay=document.createElement('div');
  overlay.className='tp-overlay';
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeTP();});
  const box=document.createElement('div');
  box.className='tp-box';
  box.innerHTML=times.map(t=>{
    const on=t===curVal;
    return `<div class="tp-item" onclick="pickTP('${t}')"><span>${t}</span><div class="tp-circle${on?' tp-on':''}"></div></div>`;
  }).join('');
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  _tp={overlay,sel,btn};
  requestAnimationFrame(()=>{
    const idx=times.indexOf(centerVal);
    if(idx>=0){
      const item=box.querySelectorAll('.tp-item')[idx];
      box.scrollTop=Math.max(0,item.offsetTop-box.clientHeight/2+item.offsetHeight/2);
    }
  });
}
function pickTP(val){
  if(!_tp)return;
  _tp.sel.value=val;
  _tp.btn.textContent=val;
  _tp.btn.classList.add('has-val');
  _tp.sel.dispatchEvent(new Event('change'));
  closeTP();
}
function closeTP(){if(_tp){_tp.overlay.remove();_tp=null;}}

/* ---- Add row ---- */
function addRow(d){
  d=d||{};
  if(!d.hasOwnProperty('tm'))d.tm=new Date().getHours()>=12?nearestTime():'';
  if(!d.hasOwnProperty('rs'))d.rs=['納品'];
  const el=document.createElement('div');
  el.className='d-item';
  const resBtns=RES.map(r=>{
    const on=(d.rs||[]).includes(r)?' on':'';
    return `<button type="button" class="res-btn${on}" data-r="${r}" onclick="this.classList.toggle('on');calcSum();save()">${r}</button>`;
  }).join('');
  el.innerHTML=`
    <div class="d-item-hdr">
      <span class="d-no">?</span>
      <input class="d-nm f-nm" type="text" maxlength="40" placeholder="お客様名" value="${e(d.nm||'')}" oninput="save()">
      <button class="btn-mic" type="button" onclick="startVoice(this)" title="音声入力">🎤</button>
      <button class="btn-del" onclick="this.closest('.d-item').remove();renum();calcSum();save()">×</button>
    </div>
    <div class="d-body">
      <div class="field sm" style="margin-bottom:10px;">
        <label>配達時間</label>
        <select class="f-tm" style="display:none;" onchange="save()">${timeOpts(d.tm||'')}</select>
        <button type="button" class="time-btn${d.tm?' has-val':''}" onclick="openTP(this.previousElementSibling)">${d.tm||'--:--'}</button>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>配送結果（複数選択可）</label>
        <div class="res-btns" style="margin-top:6px;">${resBtns}</div>
      </div>
      <div class="g4" style="margin-bottom:10px;">
        <div class="field sm"><label>配送 12L</label>
          <input type="number" class="f-d12" min="0" value="${e(d.d12||'')}" placeholder="0" oninput="calcSum();save()">
        </div>
        <div class="field sm"><label>配送 7L</label>
          <input type="number" class="f-d7" min="0" value="${e(d.d7||'')}" placeholder="0" oninput="calcSum();save()">
        </div>
        <div class="field sm"><label>空回収 12L</label>
          <input type="number" class="f-e12" min="0" value="${e(d.e12||'')}" placeholder="0" oninput="calcSum();save()">
        </div>
        <div class="field sm"><label>空回収 7L</label>
          <input type="number" class="f-e7" min="0" value="${e(d.e7||'')}" placeholder="0" oninput="calcSum();save()">
        </div>
      </div>
      <div class="field" style="margin-bottom:10px;">
        <label>サーバー作業</label>
        <div class="sv-checks">
          <label class="sv-pill${d.s1?' on':''}">
            <input type="checkbox" class="f-s1"${d.s1?' checked':''} onchange="this.closest('.sv-pill').classList.toggle('on',this.checked);save()">新規
          </label>
          <label class="sv-pill${d.s2?' on':''}">
            <input type="checkbox" class="f-s2"${d.s2?' checked':''} onchange="this.closest('.sv-pill').classList.toggle('on',this.checked);save()">メンテ/クレーム
          </label>
          <label class="sv-pill${d.s3?' on':''}">
            <input type="checkbox" class="f-s3"${d.s3?' checked':''} onchange="this.closest('.sv-pill').classList.toggle('on',this.checked);save()">回収/交換
          </label>
        </div>
        <div class="field sm" style="margin-top:8px;"><label>機種名</label>
          <input type="text" class="f-mdl" value="${e(d.mdl||'')}" placeholder="機種名を入力" oninput="save()">
        </div>
      </div>
      <div class="g2">
        <div class="field sm"><label>集金金額（円）</label>
          <input type="text" inputmode="numeric" class="f-ca" value="${e(d.ca?(+d.ca).toLocaleString():'')}" placeholder="0" oninput="fmtCash(this);calcSum();save()">
        </div>
        <div class="field sm"><label>特記事項（その他）</label>
          <input type="text" class="f-nt" maxlength="30" value="${e(d.nt||'')}" placeholder="メモ・連絡事項など" oninput="save()">
        </div>
      </div>
    </div>`;
  document.getElementById('rowsWrap').appendChild(el);
  renum(); calcSum();
}

function renum(){
  document.querySelectorAll('.d-item').forEach((el,i)=>el.querySelector('.d-no').textContent=i+1);
}
function addRowSorted(){
  if(document.querySelectorAll('.d-item').length>=25){
    alert('配送先は最大25件までです');
    return;
  }
  addRow({rs:['納品']});
  save();
}
function sortRows(){
  const rows=allRows();
  const toMin=tm=>tm?parseInt(tm)*60+parseInt(tm.split(':')[1]):9999;
  rows.sort((a,b)=>toMin(a.tm)-toMin(b.tm));
  document.getElementById('rowsWrap').innerHTML='';
  rows.forEach(r=>addRow(r));
  save();
}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---- Collect rows ---- */
function allRows(){
  return [...document.querySelectorAll('.d-item')].map(el=>({
    nm: el.querySelector('.f-nm').value,
    tm: el.querySelector('.f-tm').value,

function startVoice(btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('このブラウザは音声入力に対応していません。\nChrome/Edgeをお試しください。');return;}
  if(btn.classList.contains('listening'))return;
  const inp=btn.previousElementSibling;
  const rec=new SR();
  rec.lang='ja-JP';
  rec.interimResults=false;
  rec.maxAlternatives=1;
  btn.classList.add('listening');
  btn.textContent='🔴';
  rec.onresult=e=>{
    const raw=e.results[0][0].transcript;
    const corrected=getVD()[raw]||abbrevCorp(raw);
    inp.value=corrected;
    inp.addEventListener('blur',function learn(){
      inp.removeEventListener('blur',learn);
      const cur=inp.value.trim();
      if(cur && cur!==corrected){getVD()[raw]=cur;saveVD();}
    });
    save();
  };
  rec.onerror=e=>{if(e.error!=='no-speech')alert('音声認識エラー: '+e.error);};
  rec.onend=()=>{btn.classList.remove('listening');btn.textContent='🎤';};
  rec.start();
}

/* ---- Cash formatting ---- */
function fmtCash(el){
  const pos=el.selectionStart;
  const oldLen=el.value.length;
  const raw=el.value.replace(/[^0-9]/g,'');
  const formatted=raw?Number(raw).toLocaleString('ja-JP'):'';
  el.value=formatted;
  const newPos=Math.max(0,pos+(formatted.length-oldLen));
  el.setSelectionRange(newPos,newPos);
}

/* ---- Save / Load ---- */
function getState(){
  return{date:document.getElementById('hDate').value,name:document.getElementById('hName').value,
    areas:[...selAreas],aOth:document.getElementById('aOth').value,
    note:document.getElementById('hNote').value,bottle:document.getElementById('hBottle').value,rows:allRows()};
}
function save(){try{localStorage.setItem('nippo5',JSON.stringify(getState()));}catch(ex){}}
function noteInput(el){
  const MAX_LINE=22, MAX_LINES=4;
  const pos=el.selectionStart;
  const old=el.value;
  // 長い行を自動折り返し、5行上限
  let lines=[];
  for(const seg of old.split('\n')){
    if(lines.length>=MAX_LINES)break;
    if(seg.length===0){lines.push('');}
    else{for(let i=0;i<seg.length;i+=MAX_LINE){if(lines.length>=MAX_LINES)break;lines.push(seg.slice(i,i+MAX_LINE));}}
  }
  const newVal=lines.join('\n');
  if(old!==newVal){
    // カーソル位置補正：挿入された改行の数を加算
    let extra=0,col=0;
    for(let i=0;i<pos&&i<old.length;i++){
      if(old[i]==='\n'){col=0;}else{col++;if(col>MAX_LINE){extra++;col=1;}}
    }
    el.value=newVal;
    el.setSelectionRange(Math.min(pos+extra,newVal.length),Math.min(pos+extra,newVal.length));
  }
  document.getElementById('noteCount').textContent=MAX_LINES*MAX_LINE+(MAX_LINES-1)-el.value.length;
  save();
}
function loadSaved(){
  try{
    const s=JSON.parse(localStorage.getItem('nippo5'));
    if(!s) return false;
    document.getElementById('hDate').value=s.date||'';
    document.getElementById('hName').value=s.name||'';
    document.getElementById('aOth').value=s.aOth||'';
    document.getElementById('hNote').value=s.note||'';
    document.getElementById('hBottle').value=s.bottle||'';
    setAreas(s.areas||[]);
    (s.rows||[]).forEach(r=>addRow(r));
    onDateChange(); return true;
  }catch(ex){return false;}
}
function newDay(){
  if(!confirm('入力内容をクリアして新しい日報を作成しますか？')) return;
  localStorage.removeItem('nippo5');
  ['hDate','hName','aOth','hNote','hBottle'].forEach(id=>document.getElementById(id).value='');

  seq=0; setAreas([]);
  const now=new Date();
  document.getElementById('hDate').value=now.toISOString().slice(0,10);
  onDateChange();
  addRow();
  calcSum();
}

    const file=new File([blob],fileName,{type:'text/html'});
    navigator.share({files:[file],title:shareTitle,text:''})
      .catch(e=>{if(e.name!=='AbortError') _dlFile(blob,fileName);});
  }else{
    _dlFile(blob,fileName);
  }
}
function _dlFile(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=name;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  alert('ファイルを保存しました。\nメールに添付して送信してください。\n宛先：achakata@takamitsu.com\n\n受け取ったPCでブラウザで開き、印刷してください。');
}

/* ---- Init ---- */
window.addEventListener('DOMContentLoaded',()=>{
  buildAreaBtns();
  if(!loadSaved()){
    const now=new Date();
    document.getElementById('hDate').value=now.toISOString().slice(0,10);
    onDateChange();
    addRow();
    calcSum();
  }
});
</script>
